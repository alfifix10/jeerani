<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeerani — لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a0a0f; color: #e8e8f0; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #6c5ce7; }
        h2 { font-size: 18px; margin: 24px 0 12px; color: #00cec9; }
        .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
        .stat { background: #12121a; border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 16px 24px; flex: 1; min-width: 150px; }
        .stat-num { font-size: 32px; font-weight: 900; color: #6c5ce7; }
        .stat-label { font-size: 13px; color: #7f7f9a; }
        table { width: 100%; border-collapse: collapse; background: #12121a; border-radius: 14px; overflow: hidden; }
        th { background: #1a1a2e; color: #00cec9; padding: 12px 16px; text-align: right; font-size: 13px; }
        td { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        tr:hover { background: rgba(108, 92, 231, 0.05); }
        .badge { padding: 3px 10px; border-radius: 50px; font-size: 11px; }
        .badge-online { background: rgba(0,206,201,0.15); color: #00cec9; }
        .empty { text-align: center; color: #7f7f9a; padding: 40px; }
        #password-gate { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; gap: 16px; }
        #password-gate input { padding: 14px 20px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.07); background: #12121a; color: #e8e8f0; font-family: 'Cairo'; font-size: 16px; width: 300px; text-align: center; }
        #password-gate button { padding: 12px 32px; border-radius: 14px; border: none; background: #6c5ce7; color: white; font-family: 'Cairo'; font-size: 16px; font-weight: 700; cursor: pointer; }
        .msg-text { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .refresh-btn { padding: 8px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: #1a1a2e; color: #e8e8f0; font-family: 'Cairo'; cursor: pointer; font-size: 13px; }
        .refresh-btn:hover { background: #252540; }
    </style>
</head>
<body>
    <div id="password-gate">
        <h1>🔐 لوحة الإدارة</h1>
        <input type="password" id="adminPass" placeholder="كلمة المرور">
        <button onclick="checkPass()">دخول</button>
    </div>

    <div id="dashboard" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
            <h1>📊 لوحة إدارة Jeerani</h1>
            <button class="refresh-btn" onclick="loadAll()">🔄 تحديث</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-num" id="statOnline">0</div>
                <div class="stat-label">متصل الآن</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="statMsgs">0</div>
                <div class="stat-label">رسالة اليوم</div>
            </div>
        </div>

        <h2>👥 المتصلين الآن</h2>
        <table>
            <thead><tr><th>الاسم</th><th>الحالة</th><th>آخر نشاط</th></tr></thead>
            <tbody id="onlineTable"></tbody>
        </table>

        <h2>💬 آخر المحادثات</h2>
        <table>
            <thead><tr><th>المرسل</th><th>المستقبل</th><th>الرسالة</th><th>الوقت</th></tr></thead>
            <tbody id="logsTable"></tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
    <script>
        var ADMIN_PASS = 'jeerani2025';

        firebase.initializeApp({
            apiKey: "AIzaSyBxr265lCyx0GJw02oE9GQev8kBQRgiTZw",
            databaseURL: "https://jiranak-e9ee2-default-rtdb.firebaseio.com",
            projectId: "jiranak-e9ee2"
        });
        var db = firebase.database();

        function checkPass() {
            if (document.getElementById('adminPass').value === ADMIN_PASS) {
                document.getElementById('password-gate').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadAll();
            } else {
                alert('كلمة المرور غير صحيحة');
            }
        }

        document.getElementById('adminPass').onkeypress = function(e) {
            if (e.key === 'Enter') checkPass();
        };

        function loadAll() {
            // المتصلين
            db.ref('online').once('value', function(snap) {
                var data = snap.val() || {};
                var users = Object.entries(data);
                document.getElementById('statOnline').textContent = users.length;
                var html = '';
                if (users.length === 0) {
                    html = '<tr><td colspan="3" class="empty">لا يوجد أحد متصل</td></tr>';
                } else {
                    users.forEach(function(entry) {
                        var id = entry[0], u = entry[1];
                        var time = u.t ? new Date(u.t).toLocaleTimeString('ar') : '—';
                        html += '<tr><td><strong>' + esc(u.name || '—') + '</strong><br><small style="color:#7f7f9a">' + id.slice(0,12) + '...</small></td>';
                        html += '<td><span class="badge badge-online">متصل</span></td>';
                        html += '<td>' + time + '</td></tr>';
                    });
                }
                document.getElementById('onlineTable').innerHTML = html;
            });

            // السجل
            db.ref('logs').orderByChild('t').limitToLast(100).once('value', function(snap) {
                var data = snap.val() || {};
                var msgs = Object.values(data).reverse();
                document.getElementById('statMsgs').textContent = msgs.length;
                var html = '';
                if (msgs.length === 0) {
                    html = '<tr><td colspan="4" class="empty">لا توجد رسائل</td></tr>';
                } else {
                    msgs.forEach(function(m) {
                        var time = m.t ? new Date(m.t).toLocaleTimeString('ar') : '—';
                        html += '<tr><td>' + esc(m.fromName || '—') + '</td>';
                        html += '<td>' + esc(m.toName || '—') + '</td>';
                        html += '<td class="msg-text">' + esc(m.text || '') + '</td>';
                        html += '<td>' + time + '</td></tr>';
                    });
                }
                document.getElementById('logsTable').innerHTML = html;
            });
        }

        function esc(text) {
            var d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }
    </script>
</body>
</html>
