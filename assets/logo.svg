<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <defs>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="50%" style="stop-color:#9c27b0"/>
      <stop offset="100%" style="stop-color:#e91e8c"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#9c27b0;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- فقاعة الدردشة -->
  <path d="M200 60 C280 60 340 110 340 175 C340 240 280 290 200 290 C180 290 162 286 145 280 L100 320 L115 270 C80 248 60 215 60 175 C60 110 120 60 200 60 Z"
        fill="url(#bubble)" opacity="0.95"/>

  <!-- القلب الكبير (خط خارجي) -->
  <path d="M200 245 C200 245 130 195 130 155 C130 130 150 115 170 115 C185 115 195 125 200 135 C205 125 215 115 230 115 C250 115 270 130 270 155 C270 195 200 245 200 245 Z"
        fill="none" stroke="#1a1a3e" stroke-width="8" stroke-linejoin="round"/>

  <!-- القلب الكبير (تعبئة) -->
  <path d="M200 240 C200 240 135 192 135 155 C135 133 153 120 170 120 C185 120 195 128 200 138 C205 128 215 120 230 120 C247 120 265 133 265 155 C265 192 200 240 200 240 Z"
        fill="url(#heart)" opacity="0.7"/>

  <!-- القلب الصغير بالداخل -->
  <path d="M200 210 C200 210 168 185 168 168 C168 157 178 150 188 150 C194 150 198 154 200 158 C202 154 206 150 212 150 C222 150 232 157 232 168 C232 185 200 210 200 210 Z"
        fill="#1a1a3e" opacity="0.85"/>

  <!-- نجوم متناثرة -->
  <!-- نجمة 1 (أعلى يسار) -->
  <g transform="translate(95, 75)" fill="white" opacity="0.9">
    <rect x="-1.5" y="-7" width="3" height="14" rx="1.5"/>
    <rect x="-7" y="-1.5" width="14" height="3" rx="1.5"/>
  </g>

  <!-- نجمة 2 (أعلى يسار صغيرة) -->
  <g transform="translate(120, 50)" fill="white" opacity="0.6">
    <rect x="-1" y="-5" width="2" height="10" rx="1"/>
    <rect x="-5" y="-1" width="10" height="2" rx="1"/>
  </g>

  <!-- نجمة 3 (يمين فوق) -->
  <g transform="translate(310, 90)" fill="#00e5ff" opacity="0.8">
    <rect x="-1.5" y="-6" width="3" height="12" rx="1.5"/>
    <rect x="-6" y="-1.5" width="12" height="3" rx="1.5"/>
  </g>

  <!-- نجمة 4 (يمين وسط) -->
  <g transform="translate(340, 200)" fill="white" opacity="0.5">
    <rect x="-1" y="-4" width="2" height="8" rx="1"/>
    <rect x="-4" y="-1" width="8" height="2" rx="1"/>
  </g>

  <!-- نجمة 5 (يسار وسط) -->
  <g transform="translate(55, 220)" fill="white" opacity="0.7">
    <rect x="-1" y="-5" width="2" height="10" rx="1"/>
    <rect x="-5" y="-1" width="10" height="2" rx="1"/>
  </g>

  <!-- نجمة 6 (أسفل يمين) -->
  <g transform="translate(295, 270)" fill="#00e5ff" opacity="0.6">
    <rect x="-1" y="-4" width="2" height="8" rx="1"/>
    <rect x="-4" y="-1" width="8" height="2" rx="1"/>
  </g>

  <!-- كلمة JEERANI -->
  <text x="200" y="380" text-anchor="middle" font-family="'Poppins', 'Arial', sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="6">JEERANI</text>
</svg>
