<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#252540"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- خلفية دائرية -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" opacity="0.15"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#bg)" stroke-width="2"/>

  <!-- الجدار -->
  <rect x="85" y="50" width="18" height="130" rx="3" fill="url(#wall)" stroke="#6c5ce7" stroke-width="1.5" opacity="0.9"/>

  <!-- رأس الجار المتلصص (يطل من وراء الجدار) -->
  <g transform="translate(60, 75)">
    <!-- الرأس -->
    <circle cx="20" cy="20" r="22" fill="#252540" stroke="#6c5ce7" stroke-width="2"/>

    <!-- العينين (فضوليتين) -->
    <ellipse cx="12" cy="16" rx="5" ry="6" fill="#1a1a2e"/>
    <ellipse cx="28" cy="16" rx="5" ry="6" fill="#1a1a2e"/>
    <circle cx="14" cy="15" r="2.5" fill="#00cec9"/>
    <circle cx="30" cy="15" r="2.5" fill="#00cec9"/>
    <!-- بريق العين -->
    <circle cx="15" cy="13.5" r="1" fill="white" opacity="0.8"/>
    <circle cx="31" cy="13.5" r="1" fill="white" opacity="0.8"/>

    <!-- حاجبين مرفوعين (فضول) -->
    <path d="M7 8 Q12 3 17 7" stroke="#a29bfe" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M23 7 Q28 3 33 8" stroke="#a29bfe" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- فم مبتسم صغير -->
    <path d="M14 28 Q20 34 26 28" stroke="#a29bfe" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- أصابع ممسكة بالجدار -->
    <rect x="38" y="30" width="8" height="5" rx="2.5" fill="#252540" stroke="#6c5ce7" stroke-width="1"/>
    <rect x="38" y="37" width="8" height="5" rx="2.5" fill="#252540" stroke="#6c5ce7" stroke-width="1"/>
    <rect x="38" y="44" width="8" height="5" rx="2.5" fill="#252540" stroke="#6c5ce7" stroke-width="1"/>
  </g>

  <!-- فقاعة الدردشة -->
  <g transform="translate(115, 45)">
    <path d="M0 25 C0 10 10 0 25 0 L55 0 C70 0 80 10 80 25 L80 40 C80 55 70 62 55 62 L30 62 L15 75 L20 58 C8 55 0 45 0 35 Z"
          fill="url(#bg)" opacity="0.9"/>
    <!-- نقاط الكتابة -->
    <circle cx="25" cy="30" r="4" fill="white" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="30" r="4" fill="white" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="55" cy="30" r="4" fill="white" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- علامة استفهام صغيرة فوق الرأس -->
  <text x="55" y="62" font-size="20" fill="#00cec9" font-weight="bold" opacity="0.7">؟</text>

</svg>
